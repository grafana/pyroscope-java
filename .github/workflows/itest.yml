name: Integration smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  discover-tests:
    runs-on: ubuntu-x64
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: stable
          cache-dependency-path: itest/go.sum
      - name: List test functions
        id: list
        run: |
          tests=$(cd itest && go test -list . ./... 2>/dev/null | grep '^Test' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$tests" >> "$GITHUB_OUTPUT"

  integration-smoke-test:
    needs: discover-tests
    runs-on: ubuntu-x64
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover-tests.outputs.tests) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: stable
          cache-dependency-path: itest/go.sum
      - name: Run ${{ matrix.test }}
        run: cd itest && go test -v -timeout 15m -count=1 -run '^${{ matrix.test }}$$' ./...
