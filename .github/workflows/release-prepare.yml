name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version Bump Type'
        required: true
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-x64
    steps:
      - id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@580590a644e82e79bb2598bdaba0be245a14dda0 # create-github-app-token/v0.2.2
        with:
          github_app: pyroscope-development-app

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          persist-credentials: true

      - name: Bump Version
        id: bump_version
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          current_version=$(grep 'pyroscope_version=' gradle.properties | cut -d'=' -f2)
          echo "Current version: $current_version"
          IFS='.' read -r major minor patch <<< "$current_version"

          case "$VERSION_BUMP" in
            "major")
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            "minor")
              minor=$((minor + 1))
              patch=0
              ;;
            "patch")
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "New version: $new_version"

          sed -i "s/pyroscope_version=.*/pyroscope_version=$new_version/" gradle.properties
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Get GitHub App User ID
        id: get-user-id
        env:
          GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
        run: |
          APP_BOT="pyroscope-development-app[bot]"
          echo "user-id=$(gh api "/users/${APP_BOT}" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Create Release Branch and PR
        env:
          GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          USER_ID: ${{ steps.get-user-id.outputs.user-id }}
          VERSION: ${{ steps.bump_version.outputs.version }}
        run: |
          APP_BOT="pyroscope-development-app[bot]"
          git config --global user.name "${APP_BOT}"
          git config --global user.email "${USER_ID}+${APP_BOT}@users.noreply.github.com"

          BRANCH="release/v${VERSION}"
          git checkout -b "${BRANCH}"
          git add gradle.properties
          git commit -m "version ${VERSION}"
          git push origin "${BRANCH}"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "Release v${VERSION}" \
            --body "Automated release PR for version ${VERSION}.

          Once this PR is merged, the release-publish workflow will automatically:
          - Build and publish artifacts to Maven Central
          - Create the v${VERSION} tag
          - Create a GitHub release"
